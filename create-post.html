<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            const savedTheme = localStorage.getItem("mru-cs-hub-theme");
            const systemPrefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
            const initialTheme = savedTheme || (systemPrefersDark ? "dark" : "light");
            document.documentElement.setAttribute("data-theme", initialTheme);
        })();
    </script>
    <title>Create a Post | MRU CS Hub</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="theme.js"></script>
</head>
<body>

<header>
    <div class="header-left">
        <h1>MRU CS Hub</h1>
        <p class="subtitle">
            Share notes, exams, and examples with fellow MRU CS students
        </p>
    </div>

    <nav>
        <span id="userDisplay"></span>
        <logbuttn id="loginBtn"> <h2>Login</h2></logbuttn>
        <logbuttn id="logoutBtn" style="display:none;"><h2>Logout</h2></logbuttn>
    </nav>
</header>

<main class="content form-page">
    <nav class="breadcrumb form-breadcrumb">
        <a href="index.html">Home</a> →
        <span id="formBreadcrumbLabel">Create a Post</span>
    </nav>

    <div class="post-card post-form">
        <input 
            id="postFile" 
            type="file" 
            accept=".pdf,.doc,.docx,.png,.jpg"
        >
        
        <input
            id="postTitle"
            type="text"
            placeholder="Post title"
        >

        <div class="post-card post-form">
            <label for="postTitle">Post title</label>
            <input
                id="postTitle"
                type="text"
                placeholder="Example: COMP 2655 Midterm Review Notes"
            >

            <label for="postCourse">Course</label>
            <input
                id="postCourse"
                type="text"
                placeholder="Course (e.g. COMP 2633)"
            >

            <label for="postType">Resource type</label>
            <select id="postType">
                <option value="notes">Notes</option>
                <option value="exams">Previous Exams & Assignments</option>
                <option value="practice">Practice Questions</option>
            </select>

            <label for="postDesc">Description</label>
            <textarea
                id="postDesc"
                rows="7"
                placeholder="Describe the resource you are sharing"
            ></textarea>

            <p id="postFormMessage" class="form-message" aria-live="polite"></p>

            <div class="form-button-row">
                <button id="submitPostBtn" class="btn-primary" onclick="savePost()">Post</button>
            </div>
        </div>
    </section>
</main>

<footer class="site-footer">
    <div class="footer-content">
        <p><strong>MRU CS Hub</strong> — A student-built project</p>
        <p>
            📧 Contact: hye582@mtroyal.ca/jlam013@mtroyal.ca
            | 🐞 <a href="#">Report a bug</a>
        </p>
        <p class="footer-note">
            This platform is not officially affiliated with Mount Royal University.
        </p>
    </div>
</footer>

<script src="create-post.js"></script>

</body>
</html>
